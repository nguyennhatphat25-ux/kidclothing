<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng Nhập - KidClothing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-pink-50 flex items-center justify-center h-screen m-0">

<div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md border border-pink-100">

    <div class="mb-6">
        <a th:href="@{/}" class="text-gray-400 hover:text-pink-600 font-semibold transition flex items-center gap-2">
            <i class="fa-solid fa-arrow-left"></i> Trở về trang chủ
        </a>
    </div>

    <div class="text-center mb-8">
        <a th:href="@{/}" class="text-4xl font-extrabold text-pink-600 mb-2 block tracking-wider">
            <i class="fa-solid fa-face-smile-wink text-pink-500 mr-1"></i> KidClothing
        </a>
        <h2 class="text-xl font-bold text-gray-700 uppercase tracking-tight">Cổng Đăng Nhập</h2>
        <p class="text-gray-500 mt-2 text-sm">Vui lòng đăng nhập để bắt đầu mua sắm</p>
    </div>

    <div th:if="${param.error}" class="bg-red-50 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded mb-5 text-sm">
        Tên đăng nhập hoặc mật khẩu không chính xác!
    </div>

    <form th:action="@{/login}" method="post" class="space-y-6">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Tên đăng nhập</label>
            <input type="text" name="username" required
                   class="w-full px-4 py-2.5 border-2 border-pink-100 rounded-lg focus:border-pink-500 outline-none transition" placeholder="VD: kid123">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">Mật khẩu</label>
            <input type="password" name="password" required
                   class="w-full px-4 py-2.5 border-2 border-pink-100 rounded-lg focus:border-pink-500 outline-none transition" placeholder="Nhập mật khẩu">
        </div>

        <button type="submit" class="w-full bg-pink-500 text-white font-bold py-3.5 rounded-2xl hover:bg-pink-600 transition transform hover:-translate-y-0.5 shadow-lg uppercase tracking-wider">
            <i class="fa-solid fa-right-to-bracket mr-2"></i> Đăng Nhập Ngay
        </button>
    </form>

    <div class="text-center mt-8 text-sm text-gray-600 border-t border-pink-100 pt-6">
        <p>Chưa có tài khoản?</p>
        <a th:href="@{/register}" class="text-pink-600 font-bold hover:underline mt-1 inline-block">
            <i class="fa-solid fa-user-plus mr-1"></i> Đăng ký tài khoản mới
        </a>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${pageTitle} + ' - KidClothing'">Danh Mục</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white font-sans text-gray-800 flex flex-col min-h-screen m-0 p-0">

<div class="bg-pink-500 text-white text-sm text-center py-2 font-medium tracking-wide w-full m-0">
    <i class="fa-solid fa-gift mr-2"></i> Miễn phí giao hàng toàn quốc cho đơn từ 500.000Đ
</div>

<header class="border-b border-pink-100 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 flex justify-between items-center">
        <a th:href="@{/}" class="text-3xl font-extrabold text-pink-600 flex items-center gap-2 hover:text-pink-700 transition">
            <i class="fa-solid fa-face-smile-wink text-pink-500 mr-1"></i> KidClothing
        </a>

        <form th:action="@{/search}" method="get" class="flex-1 max-w-xl mx-8 relative">
            <input type="text" name="keyword" class="w-full border-2 border-pink-200 rounded-full pl-5 pr-12 py-2.5 focus:outline-none focus:border-pink-500 transition shadow-sm text-gray-700" placeholder="Ba mẹ muốn tìm đồ gì cho bé yêu?">
            <button type="submit" class="absolute right-4 top-3 text-pink-400 hover:text-pink-600 transition"><i class="fa-solid fa-magnifying-glass text-lg"></i></button>
        </form>

        <div class="flex items-center space-x-6">
            <a th:href="@{/profile}" class="text-gray-500 hover:text-pink-600 flex flex-col items-center transition">
                <i class="fa-regular fa-user text-xl mb-1"></i>
                <span class="text-xs font-semibold">Tài khoản</span>
            </a>

            <a th:href="@{/cart}" class="text-gray-500 hover:text-pink-600 flex flex-col items-center transition relative">
                <div class="relative">
                    <i class="fa-solid fa-bag-shopping text-2xl mb-1"></i>
                    <span class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full shadow border border-white">Giỏ</span>
                </div>
                <span class="text-xs font-semibold">Giỏ hàng</span>
            </a>
        </div>
    </div>

    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <ul class="flex justify-center space-x-8 font-bold text-gray-600 py-3 text-sm uppercase tracking-wider overflow-x-auto">
            <li><a th:href="@{/}" class="hover:text-pink-600 transition whitespace-nowrap text-gray-800">Trang Chủ</a></li>
            <li th:each="cat : ${menuCategories}">
                <a th:href="@{/category/{id}(id=${cat.id})}"
                   class="hover:text-pink-500 transition whitespace-nowrap"
                   th:classappend="${category != null and category.id == cat.id} ? 'text-pink-600 border-b-2 border-pink-600 pb-1' : ''"
                   th:text="${cat.name}">Danh mục</a>
            </li>
        </ul>
    </nav>
</header>

<main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-10 mb-16 w-full">
    <h2 class="text-3xl font-extrabold text-gray-800 mb-8 border-l-4 border-pink-500 pl-4 uppercase" th:text="${pageTitle}"></h2>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <div th:if="${#lists.isEmpty(products)}" class="col-span-full text-center py-16 bg-pink-50 rounded-3xl border border-pink-100">
            <i class="fa-solid fa-face-frown text-5xl mb-4 text-pink-300"></i>
            <p class="text-lg text-gray-600 mb-4">Rất tiếc, mục này đang chuẩn bị hàng mẫu mới!</p>
            <a th:href="@{/}" class="inline-block bg-pink-500 text-white px-6 py-2 rounded-full font-bold hover:bg-pink-600 transition shadow-md uppercase">Quay lại trang chủ</a>
        </div>

        <div th:each="product : ${products}" class="group relative flex flex-col bg-white border-2 border-transparent hover:border-pink-200 rounded-3xl shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden">
            <a th:href="@{/product/{id}(id=${product.id})}" class="block relative aspect-square bg-pink-50 overflow-hidden flex items-center justify-center p-6">
                <img th:if="${product.image}" th:src="${product.image}" class="object-cover w-full h-full group-hover:scale-110 transition duration-700" alt="Sản phẩm">
                <i th:unless="${product.image}" class="fa-solid fa-shirt text-7xl text-pink-200"></i>
            </a>
            <div class="p-5 text-center flex-grow flex flex-col justify-between bg-white">
                <a th:href="@{/product/{id}(id=${product.id})}" class="text-sm font-bold text-gray-700 hover:text-pink-600 line-clamp-2 mb-2 transition" th:text="${product.name}">Tên SP</a>
                <div class="text-pink-600 font-extrabold text-lg mt-auto" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">Giá</div>
            </div>
        </div>
    </div>
</main>

<footer class="bg-pink-50 border-t border-pink-200 pt-12 pb-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 md:grid-cols-3 gap-8 text-sm text-gray-700">
        <div>
            <a th:href="@{/}" class="text-2xl font-extrabold text-pink-600 flex items-center gap-2 mb-4 drop-shadow-sm">
                KidClothing
            </a>
            <p class="mb-2"><i class="fa-solid fa-location-dot mr-2 text-pink-500"></i> Đại học Văn Lang</p>
            <p class="mb-2"><i class="fa-solid fa-phone mr-2 text-pink-500"></i> 0123.456.789</p>
        </div>
        <div>
            <h3 class="font-bold text-pink-700 uppercase mb-4">Hỗ trợ ba mẹ</h3>
            <ul class="space-y-2">
                <li><a href="#" class="hover:text-pink-600">Đổi trả hàng</a></li>
                <li><a href="#" class="hover:text-pink-600">Hướng dẫn chọn size</a></li>
            </ul>
        </div>
        <div>
            <h3 class="font-bold text-pink-700 uppercase mb-4">Kết nối</h3>
            <div class="flex space-x-4">
                <i class="fa-brands fa-facebook text-2xl text-blue-600"></i>
                <i class="fa-brands fa-instagram text-2xl text-pink-600"></i>
            </div>
        </div>
    </div>
</footer>
</body>
</html>

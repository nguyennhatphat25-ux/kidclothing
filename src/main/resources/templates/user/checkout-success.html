<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đặt Hàng Thành Công</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
<div class="bg-white p-10 rounded-xl shadow-2xl text-center max-w-lg">
    <i class="fa-solid fa-circle-check text-green-500 text-7xl mb-4"></i>
    <h1 class="text-3xl font-bold text-gray-800 mb-2">Đặt Hàng Thành Công!</h1>
    <p class="text-gray-600 mb-6">Mã đơn hàng của bạn là: <strong class="text-blue-600">#<span th:text="${orderId}"></span></strong></p>
    <p class="text-gray-600 mb-8">Chúng tôi sẽ sớm liên hệ để giao quần áo cho bé yêu của bạn.</p>

    <a th:href="@{/}" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition">
        <i class="fa-solid fa-house mr-2"></i> Trở Về Trang Chủ
    </a>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Đăng Ký Tài Khoản - KidClothing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    baby: {
                        light: '#fdf2f8', // Hồng rất nhạt (cho nền)
                        DEFAULT: '#f472b6', // Hồng baby chuẩn
                        dark: '#db2777', // Hồng đậm
                        hover: '#ec4899' // Hồng di chuột
                    }
                }
            }
        }
    }
  </script>
</head>
<body class="bg-baby-light flex items-center justify-center min-h-screen m-0 p-5">

<div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-xl border border-pink-100">
  <div class="text-center mb-8">
    <a th:href="@{/}" class="text-4xl font-extrabold text-baby-dark mb-2 block tracking-wider">
      <i class="fa-solid fa-face-smile-wink text-baby-DEFAULT mr-1"></i> KidClothing
    </a>
    <h2 class="text-xl font-bold text-gray-700 uppercase tracking-tight">Đăng Ký Thành Viên Mới</h2>
    <p class="text-gray-500 mt-2 text-sm">Hoàn tất thông tin bên dưới để tham gia</p>
  </div>

  <div th:if="${error}" class="bg-red-50 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded mb-5 text-sm">
    <p class="font-bold">Lỗi đăng ký!</p>
    <p th:text="${error}"></p>
  </div>

  <form th:action="@{/register}" method="post" class="space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5"><i class="fa-regular fa-address-card mr-1 text-baby-DEFAULT"></i> Họ và tên</label>
        <input type="text" name="fullName" required class="w-full px-4 py-2.5 border-2 border-pink-100 rounded-lg">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5"><i class="fa-solid fa-phone mr-1 text-baby-DEFAULT"></i> Số điện thoại</label>
        <input type="text" name="phone" required class="w-full px-4 py-2.5 border-2 border-pink-100 rounded-lg">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5"><i class="fa-regular fa-envelope mr-1 text-baby-DEFAULT"></i> Email liên hệ</label>
        <input type="email" name="email" required class="w-full px-4 py-2.5 border-2 border-pink-100 rounded-lg">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5"><i class="fa-regular fa-user mr-1 text-baby-DEFAULT"></i> Tên đăng nhập</label>
        <input type="text" name="username" required class="w-full px-4 py-2.5 border-2 border-pink-100 rounded-lg">
      </div>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1.5"><i class="fa-solid fa-lock mr-1 text-baby-DEFAULT"></i> Mật khẩu</label>
      <input type="password" name="password" required class="w-full px-4 py-2.5 border-2 border-pink-100 rounded-lg">
      <p class="text-gray-500 text-xs mt-1.5 pl-1 italic">Mật khẩu phải dài trên 6 ký tự để đảm bảo an toàn.</p>
    </div>

    <button type="submit" class="w-full bg-pink-500 text-white font-bold py-3.5 rounded-2xl hover:bg-pink-600 transition transform hover:-translate-y-0.5 shadow-lg">
      <i class="fa-solid fa-user-plus mr-2"></i> Tạo Tài Khoản
    </button>
  </form>

  <div class="text-center mt-8 text-sm text-gray-600 border-t border-pink-100 pt-6">
    <p>Đã có tài khoản?</p>
    <a th:href="@{/login}" class="text-baby-dark font-bold hover:text-baby-hover hover:underline mt-1 inline-block">
      <i class="fa-solid fa-right-to-bracket mr-1"></i> Đăng nhập ngay
    </a>
  </div>
</div>

</body>
</html>

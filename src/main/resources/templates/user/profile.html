<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hồ Sơ Của Tôi - KidClothing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white font-sans text-gray-800 flex flex-col min-h-screen m-0 p-0">

<div class="bg-pink-500 text-white text-sm text-center py-2 font-medium tracking-wide w-full m-0">
    <i class="fa-solid fa-gift mr-2"></i> Miễn phí giao hàng toàn quốc cho đơn từ 500.000Đ
</div>

<header class="border-b border-pink-100 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 flex justify-between items-center">
        <a th:href="@{/}" class="text-3xl font-extrabold text-pink-600 flex items-center gap-2 hover:text-pink-700 transition">
            <i class="fa-solid fa-face-smile-wink text-pink-500 mr-1"></i> KidClothing
        </a>

        <form th:action="@{/search}" method="get" class="flex-1 max-w-xl mx-8 relative">
            <input type="text" name="keyword" class="w-full border-2 border-pink-200 rounded-full pl-5 pr-12 py-2.5 focus:outline-none focus:border-pink-500 transition shadow-sm text-gray-700" placeholder="Ba mẹ muốn tìm đồ gì cho bé yêu?">
            <button type="submit" class="absolute right-4 top-3 text-pink-400 hover:text-pink-600 transition"><i class="fa-solid fa-magnifying-glass text-lg"></i></button>
        </form>

        <div class="flex items-center space-x-6">
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="text-gray-500 hover:text-red-500 flex flex-col items-center transition">
                    <i class="fa-solid fa-right-from-bracket text-xl mb-1"></i>
                    <span class="text-xs font-semibold">Đăng xuất</span>
                </button>
            </form>

            <a th:href="@{/cart}" class="text-gray-500 hover:text-pink-600 flex flex-col items-center transition relative">
                <div class="relative">
                    <i class="fa-solid fa-bag-shopping text-2xl mb-1"></i>
                    <span class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full shadow border border-white">Giỏ</span>
                </div>
                <span class="text-xs font-semibold">Giỏ hàng</span>
            </a>
        </div>
    </div>

    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <ul class="flex justify-center space-x-8 font-bold text-gray-600 py-3 text-sm uppercase tracking-wider overflow-x-auto">
            <li>
                <a th:href="@{/}" class="text-pink-600 border-b-2 border-pink-600 pb-1 whitespace-nowrap">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Quay lại mua sắm
                </a>
            </li>
            <li th:each="cat : ${menuCategories}">
                <a th:href="@{/category/{id}(id=${cat.id})}" class="hover:text-pink-500 transition whitespace-nowrap" th:text="${cat.name}">Danh mục</a>
            </li>
        </ul>
    </nav>
</header>

<main class="flex-grow bg-pink-50 py-12">
    <div class="container mx-auto px-4 max-w-2xl">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-pink-100">
            <div class="bg-gradient-to-r from-pink-400 to-rose-400 p-10 text-center text-white">
                <div class="w-24 h-24 bg-white rounded-full mx-auto flex items-center justify-center text-pink-500 text-4xl mb-4 shadow-lg">
                    <i class="fa-solid fa-user"></i>
                </div>
                <h2 class="text-2xl font-black uppercase tracking-tight" th:text="${user.fullName}">Tên Người Dùng</h2>
                <p class="mt-1 text-pink-100 italic" th:text="'@' + ${user.username}"></p>
            </div>

            <div class="p-8">
                <div class="bg-pink-50 border-2 border-pink-100 rounded-3xl p-6 mb-8 flex items-center justify-between shadow-inner">
                    <div>
                        <h3 class="text-pink-800 font-bold mb-1 uppercase text-[10px] tracking-widest">Hạng Thành Viên</h3>
                        <div class="text-3xl font-black text-pink-600" th:text="${user.membershipTier}">MEMBER</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] text-pink-500 font-bold uppercase tracking-widest">Quyền lợi giảm</div>
                        <div class="text-4xl font-black text-rose-500" th:text="${discount} + '%'">0%</div>
                    </div>
                </div>

                <div class="space-y-6">
                    <h3 class="font-bold text-gray-800 text-lg border-b border-pink-100 pb-2">Thông tin cá nhân</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="text-gray-400 text-xs font-bold uppercase">Email liên hệ</label>
                            <p class="font-bold text-gray-700 mt-1" th:text="${user.email}"></p>
                        </div>
                        <div>
                            <label class="text-gray-400 text-xs font-bold uppercase">Số điện thoại</label>
                            <p class="font-bold text-gray-700 mt-1" th:text="${user.phone}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="bg-white border-t border-pink-100 py-8">
    <div class="text-center text-pink-500 font-medium">
        &copy; 2026 KidClothing - Thời Trang Cho Bé Yêu
    </div>
</footer>
</body>
</html>

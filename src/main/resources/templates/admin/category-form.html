<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cập nhật Danh Mục</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
<div class="max-w-lg mx-auto bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">Thông tin Danh Mục</h2>

    <form th:action="@{/admin/categories/save}" th:object="${category}" method="post" class="space-y-4">
        <input type="hidden" th:field="*{id}">

        <div>
            <label class="block font-medium text-gray-700">Tên danh mục (VD: Áo bé trai, Váy bé gái...)</label>
            <input type="text" th:field="*{name}" class="w-full border rounded p-2 mt-1" required>
        </div>

        <div class="flex justify-end gap-3 mt-6">
            <a th:href="@{/admin/categories}" class="bg-gray-500 text-white px-4 py-2 rounded">Hủy</a>
            <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded">Lưu Danh Mục</button>
        </div>
    </form>
</div>
</body>
</html>

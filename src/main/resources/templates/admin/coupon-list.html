<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Quản Lý Mã Giảm Giá - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800">

<div class="flex min-h-screen">

  <div class="w-64 bg-slate-800 text-white p-6 flex flex-col shadow-xl z-10">
    <h2 class="text-2xl font-bold mb-10 text-blue-400 text-center tracking-wider">KidClothing</h2>
    <nav class="space-y-4 flex-1">
      <a th:href="@{/admin/dashboard}" class="block p-3 hover:bg-slate-700 rounded transition"><i class="fa-solid fa-chart-pie mr-2"></i>Thống Kê</a>
      <a th:href="@{/admin/products}" class="block p-3 hover:bg-slate-700 rounded transition"><i class="fa-solid fa-shirt mr-2"></i>Sản Phẩm</a>
      <a th:href="@{/admin/orders}" class="block p-3 hover:bg-slate-700 rounded transition"><i class="fa-solid fa-cart-check mr-2"></i>Đơn Hàng</a>
      <a th:href="@{/admin/categories}" class="block p-3 hover:bg-slate-700 rounded transition"><i class="fa-solid fa-list mr-2"></i>Danh Mục</a>

      <a th:href="@{/admin/coupons}" class="block p-3 bg-blue-600 rounded shadow font-bold"><i class="fa-solid fa-ticket mr-2"></i>Mã Giảm Giá</a>

      <div class="pt-6 mt-6 border-t border-slate-700">
        <a th:href="@{/}" class="block p-3 hover:bg-slate-700 rounded text-yellow-400 transition font-bold"><i class="fa-solid fa-house mr-2"></i>Ra Cửa Hàng</a>
      </div>
    </nav>
  </div>

  <main class="flex-1 p-10 bg-gray-100">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-center mb-8 border-b pb-4">
        <h2 class="text-2xl font-bold text-gray-800 uppercase tracking-tight">
          <i class="fa-solid fa-ticket text-blue-600 mr-2"></i>Danh Sách Mã Giảm Giá
        </h2>
        <a th:href="@{/admin/coupons/add}" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 px-5 rounded-lg shadow-md transition transform hover:-translate-y-0.5">
          <i class="fa-solid fa-plus mr-2"></i>Tạo Mã Mới
        </a>
      </div>

      <table class="w-full text-left border-collapse">
        <thead>
        <tr class="bg-gray-50 text-gray-600 uppercase text-xs font-bold tracking-wider">
          <th class="p-4 border-b rounded-tl-lg">Mã CODE</th>
          <th class="p-4 border-b">Mức Giảm</th>
          <th class="p-4 border-b">Hạn Sử Dụng</th>
          <th class="p-4 border-b text-center rounded-tr-lg">Thao Tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(coupons)}">
          <td colspan="4" class="p-8 text-center text-gray-400 italic">Chưa có mã giảm giá nào.</td>
        </tr>
        <tr th:each="coupon : ${coupons}" class="hover:bg-blue-50 transition border-b group">
          <td class="p-4 font-black text-blue-600 uppercase tracking-wider text-lg" th:text="${coupon.code}"></td>
          <td class="p-4 text-red-500 font-bold text-lg" th:text="${#numbers.formatDecimal(coupon.discountAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
          <td class="p-4 text-gray-600 font-medium" th:text="${coupon.expiryDate != null ? #temporals.format(coupon.expiryDate, 'dd/MM/yyyy') : 'Vĩnh viễn'}"></td>
          <td class="p-4 text-center">
            <a th:href="@{/admin/coupons/delete/{id}(id=${coupon.id})}" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded transition" onclick="return confirm('Xóa mã này?');">
              <i class="fa-solid fa-trash"></i> Xóa
            </a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </main>

</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Quản Lý Mã Giảm Giá - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800">
<div class="flex min-h-screen">
  <div th:replace="~{admin/fragments :: sidebar('coupons')}"></div>
  <main class="flex-1 p-10 bg-gray-100">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-center mb-8 border-b pb-4">
        <h2 class="text-2xl font-bold text-gray-800 uppercase tracking-tight">
          <i class="fa-solid fa-ticket text-rose-500 mr-2"></i>Danh Sách Mã Giảm Giá
        </h2>
        <a th:href="@{/admin/coupons/add}" class="bg-rose-500 hover:bg-rose-600 text-white font-bold py-2.5 px-5 rounded-lg shadow-md transition transform hover:-translate-y-0.5">
          <i class="fa-solid fa-plus mr-2"></i>Tạo Mã Mới
        </a>
      </div>
      <table class="w-full text-left border-collapse">
        <thead>
        <tr class="bg-pink-50 text-pink-800 uppercase text-xs font-bold tracking-wider">
          <th class="p-4 border-b border-pink-100 rounded-tl-lg">Mã CODE</th>
          <th class="p-4 border-b border-pink-100">Mức Giảm</th>
          <th class="p-4 border-b border-pink-100">Hạn Sử Dụng</th>
          <th class="p-4 border-b border-pink-100 text-center rounded-tr-lg">Thao Tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(coupons)}">
          <td colspan="4" class="p-8 text-center text-gray-400 italic">Chưa có mã giảm giá nào.</td>
        </tr>
        <tr th:each="coupon : ${coupons}" class="hover:bg-pink-50 transition border-b border-gray-100 group">
          <td class="p-4 font-black text-rose-600 uppercase tracking-wider text-lg" th:text="${coupon.code}"></td>
          <td class="p-4 text-pink-500 font-bold text-lg" th:text="${#numbers.formatDecimal(coupon.discountAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
          <td class="p-4 text-gray-600 font-medium" th:text="${coupon.expiryDate != null ? #temporals.format(coupon.expiryDate, 'dd/MM/yyyy') : 'Vĩnh viễn'}"></td>
          <td class="p-4 text-center">
            <a th:href="@{/admin/coupons/delete/{id}(id=${coupon.id})}" class="text-gray-400 hover:text-red-600 hover:bg-red-50 p-2 rounded transition" onclick="return confirm('Xóa mã này?');">
              <i class="fa-solid fa-trash"></i> Xóa
            </a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
</body>
</html>

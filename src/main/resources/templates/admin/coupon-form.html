<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Tạo Mã Giảm Giá</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 flex items-center justify-center min-h-screen">
<div class="bg-white p-8 rounded-xl shadow-md w-full max-w-lg">
  <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-4">Tạo Mã Giảm Giá Mới</h2>

  <form th:action="@{/admin/coupons/save}" th:object="${coupon}" method="post" class="space-y-5">
    <div>
      <label class="block font-bold text-gray-700 mb-1">Mã Code (Nhập In Hoa không dấu)</label>
      <input type="text" th:field="*{code}" class="w-full border-2 rounded p-2 uppercase focus:border-blue-500 outline-none" placeholder="VD: SUMMER50K" required>
    </div>

    <div>
      <label class="block font-bold text-gray-700 mb-1">Số tiền giảm (VNĐ)</label>
      <input type="number" th:field="*{discountAmount}" class="w-full border-2 rounded p-2 focus:border-blue-500 outline-none" placeholder="VD: 50000" required>
    </div>

    <div>
      <label class="block font-bold text-gray-700 mb-1">Hạn sử dụng (Để trống = vĩnh viễn)</label>
      <input type="date" th:field="*{expiryDate}" class="w-full border-2 rounded p-2 focus:border-blue-500 outline-none">
    </div>

    <div class="flex justify-end gap-3 pt-4">
      <a th:href="@{/admin/coupons}" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded">Hủy bỏ</a>
      <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded shadow-lg">Lưu Mã</button>
    </div>
  </form>
</div>
</body>
</html>

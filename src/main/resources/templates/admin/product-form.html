<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cập nhật Sản Phẩm</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">Thông tin Sản phẩm</h2>

    <form th:action="@{/admin/products/save}" th:object="${product}" method="post" class="space-y-4">
        <input type="hidden" th:field="*{id}">

        <div>
            <label class="block font-medium text-gray-700">Tên quần áo</label>
            <input type="text" th:field="*{name}" class="w-full border rounded p-2 mt-1" required>
        </div>

        <div>
            <label class="block font-medium text-gray-700">Thuộc Danh mục</label>
            <select th:field="*{category}" class="w-full border rounded p-2 mt-1" required>
                <option value="">-- Chọn danh mục --</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </div>

        <div>
            <label class="block font-medium text-gray-700">Giá (VNĐ)</label>
            <input type="number" th:field="*{price}" class="w-full border rounded p-2 mt-1" required>
        </div>

        <div>
            <label class="block font-medium text-gray-700">Link ảnh sản phẩm (URL)</label>
            <input type="text" th:field="*{image}" class="w-full border rounded p-2 mt-1" placeholder="Ví dụ: https://picsum.photos/400">
            <small class="text-gray-500">Hãy copy địa chỉ hình ảnh (Copy image address) từ Google dán vào đây</small>
        </div>

        <div>
            <label class="block font-medium text-gray-700">Mô tả chi tiết</label>
            <textarea th:field="*{description}" class="w-full border rounded p-2 mt-1" rows="3"></textarea>
        </div>

        <div class="flex items-center">
            <input type="checkbox" th:field="*{isBestSeller}" class="mr-2 w-5 h-5">
            <label class="font-medium text-gray-700 text-lg">Đánh dấu là Hàng Bán Chạy (Sẽ hiện lên trang chủ)</label>
        </div>

        <div class="flex justify-end gap-3 mt-6 border-t pt-4">
            <a th:href="@{/admin/products}" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded">Hủy</a>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-2 rounded">Lưu Sản Phẩm</button>
        </div>
    </form>
</div>
</body>
</html>

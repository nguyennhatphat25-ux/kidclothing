<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý Đơn Hàng - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800">
<div class="flex min-h-screen">
    <div th:replace="~{admin/fragments :: sidebar('orders')}"></div>

    <main class="flex-1 p-10 bg-gray-100">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h2 class="text-2xl font-bold text-gray-800 uppercase tracking-tight">
                    <i class="fa-solid fa-clipboard-list mr-2 text-blue-600"></i> Danh Sách Đơn Đặt Hàng
                </h2>
            </div>

            <table class="w-full text-left border-separate border-spacing-y-2">
                <thead>
                <tr class="bg-gray-50 text-gray-600 uppercase text-xs font-bold tracking-wider">
                    <th class="px-4 py-2 border-b rounded-tl-lg">Mã Đơn</th>
                    <th class="px-4 py-2 border-b">Ngày Đặt</th>
                    <th class="px-4 py-2 border-b">Khách Hàng</th>
                    <th class="px-4 py-2 border-b text-right">Tổng Tiền VNĐ</th>
                    <th class="px-4 py-2 border-b text-center">Trạng Thái</th>
                    <th class="px-4 py-2 border-b text-center rounded-tr-lg">Cập Nhật</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(orders)}"><td colspan="6" class="p-8 text-center text-gray-400">Chưa có đơn hàng nào được đặt.</td></tr>
                <tr th:each="o : ${orders}" class="bg-gray-50 hover:bg-blue-50 transition shadow-sm rounded-lg">
                    <td class="px-4 py-4 rounded-l-lg border font-black text-gray-800" th:text="'#' + ${o.id}"></td>
                    <td class="px-4 py-4 border text-gray-600" th:text="${#temporals.format(o.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td class="px-4 py-4 border">
                        <span th:if="${o.user}" th:text="${o.user.fullName}" class="font-medium"></span>
                        <span th:unless="${o.user}" class="text-gray-500 italic">Khách vãng lai</span>
                    </td>
                    <td class="px-4 py-4 border text-right font-bold text-red-600 text-lg" th:text="${#numbers.formatDecimal(o.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                    <td class="px-4 py-4 border text-center">
                                <span th:text="${o.status}"
                                      th:class="${o.status == 'DELIVERED' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'} + ' px-3 py-1 rounded-full text-xs font-bold uppercase'">
                                </span>
                    </td>
                    <td class="px-4 py-4 rounded-r-lg border text-center">
                        <form th:action="@{/admin/orders/update-status}" method="post" class="inline-flex gap-2 items-center">
                            <input type="hidden" name="orderId" th:value="${o.id}">
                            <select name="status" class="text-xs border rounded p-1 shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                                <option value="PENDING" th:selected="${o.status == 'PENDING'}">Chờ xử lý</option>
                                <option value="SHIPPING" th:selected="${o.status == 'SHIPPING'}">Đang giao</option>
                                <option value="DELIVERED" th:selected="${o.status == 'DELIVERED'}">Hoàn thành</option>
                                <option value="CANCELLED" th:selected="${o.status == 'CANCELLED'}">Đã hủy</option>
                            </select>
                            <button type="submit" class="bg-gray-200 hover:bg-gray-300 text-gray-700 p-1 px-3 rounded text-xs transition shadow-sm"><i class="fa-solid fa-floppy-disk"></i></button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Thống Kê Hệ Thống - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">
<div class="flex">
  <div class="w-64 bg-slate-800 min-h-screen text-white p-6">
    <h2 class="text-2xl font-bold mb-10 text-blue-400">KidClothing</h2>
    <nav class="space-y-4">
      <a th:href="@{/admin/dashboard}" class="block p-3 bg-blue-600 rounded shadow"><i class="fa-solid fa-chart-pie mr-2"></i>Thống Kê</a>
      <a th:href="@{/admin/products}" class="block p-3 hover:bg-slate-700 rounded transition"><i class="fa-solid fa-shirt mr-2"></i>Sản Phẩm</a>
      <a th:href="@{/admin/orders}" class="block p-3 hover:bg-slate-700 rounded transition"><i class="fa-solid fa-cart-check mr-2"></i>Đơn Hàng</a>
      <a th:href="@{/admin/categories}" class="block p-3 hover:bg-slate-700 rounded transition"><i class="fa-solid fa-list mr-2"></i>Danh Mục</a>

      <a th:href="@{/admin/coupons}" class="block p-3 hover:bg-slate-700 rounded transition text-green-400"><i class="fa-solid fa-ticket mr-2"></i>Mã Giảm Giá</a>

      <div class="pt-6 mt-6 border-t border-slate-700">
        <a th:href="@{/}" class="block p-3 hover:bg-slate-700 rounded text-yellow-400 transition"><i class="fa-solid fa-house mr-2"></i>Ra Cửa Hàng</a>
      </div>
    </nav>
  </div>

  <main class="flex-1 p-10">
    <h1 class="text-3xl font-bold text-gray-800 mb-8 uppercase tracking-tight">Báo Cáo Hoạt Động</h1>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
      <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-red-500">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-500 font-bold uppercase">Doanh Thu Thu Thực</p>
            <h3 class="text-2xl font-black text-red-600" th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + 'đ'"></h3>
          </div>
          <i class="fa-solid fa-money-bill-trend-up text-3xl text-red-100"></i>
        </div>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-green-500">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-500 font-bold uppercase">Tổng Đơn Hàng</p>
            <h3 class="text-2xl font-black text-gray-800" th:text="${totalOrders}">0</h3>
          </div>
          <i class="fa-solid fa-cart-check text-3xl text-green-100"></i>
        </div>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-blue-500">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-500 font-bold uppercase">Sản phẩm đang bán</p>
            <h3 class="text-2xl font-black text-gray-800" th:text="${totalProducts}">0</h3>
          </div>
          <i class="fa-solid fa-shirt text-3xl text-blue-100"></i>
        </div>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-purple-500">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-gray-500 font-bold uppercase">Thành viên</p>
            <h3 class="text-2xl font-black text-gray-800" th:text="${totalUsers}">0</h3>
          </div>
          <i class="fa-solid fa-users text-3xl text-purple-100"></i>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>

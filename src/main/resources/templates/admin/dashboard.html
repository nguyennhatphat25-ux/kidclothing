<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Thống Kê Hệ Thống - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800">
<div class="flex min-h-screen">
  <div th:replace="~{admin/fragments :: sidebar('dashboard')}"></div>
  <main class="flex-1 p-10 bg-gray-100">
    <div class="mb-8 border-b pb-4 border-gray-200">
      <h1 class="text-3xl font-black text-gray-800 uppercase tracking-tight">
        <i class="fa-solid fa-chart-pie text-pink-600 mr-2"></i>Báo Cáo Hoạt Động
      </h1>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
      <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-rose-500 hover:shadow-md transition">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Doanh Thu Thực</p>
            <h3 class="text-3xl font-black text-rose-600" th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' đ'"></h3>
          </div>
          <i class="fa-solid fa-money-bill-trend-up text-4xl text-rose-100"></i>
        </div>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-pink-500 hover:shadow-md transition">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Tổng Đơn Hàng</p>
            <h3 class="text-3xl font-black text-pink-600" th:text="${totalOrders}">0</h3>
          </div>
          <i class="fa-solid fa-cart-check text-4xl text-pink-100"></i>
        </div>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-purple-500 hover:shadow-md transition">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Sản phẩm đang bán</p>
            <h3 class="text-3xl font-black text-purple-600" th:text="${totalProducts}">0</h3>
          </div>
          <i class="fa-solid fa-shirt text-4xl text-purple-100"></i>
        </div>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-sm border-t-4 border-fuchsia-500 hover:shadow-md transition">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Thành viên</p>
            <h3 class="text-3xl font-black text-fuchsia-600" th:text="${totalUsers}">0</h3>
          </div>
          <i class="fa-solid fa-users text-4xl text-fuchsia-100"></i>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
